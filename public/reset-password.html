<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password | INVENZO</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="login-card">
    <h3 class="text-center mb-4 fw-bold">Reset Password</h3>
    <form id="resetPasswordForm">
      <div class="mb-3">
        <label for="password" class="form-label">New Password</label>
        <input type="password" class="form-control" id="password" required placeholder="At least 8 characters">
      </div>
      <div class="mb-3">
        <label for="confirmPassword" class="form-label">Confirm Password</label>
        <input type="password" class="form-control" id="confirmPassword" required placeholder="Re-enter password">
      </div>
      <div class="d-grid mb-3">
        <button type="submit" class="btn btn-primary">Reset Password</button>
      </div>
      <p class="text-center text-muted"><a href="login.html">Back to login</a></p>
    </form>
    <div id="resetPasswordMessage" class="small text-center"></div>
  </div>
  <script src="js/resetPassword.js"></script>
</body>
</html>
