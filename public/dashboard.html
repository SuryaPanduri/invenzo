<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>INVENZO Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />
  <link href="css/dashboard.css" rel="stylesheet" />
  <link rel="icon" type="image/png" sizes="100x100" href="images/favicon.png" />
</head>
<body>
  <div class="dashboard-shell">
    <aside class="sidebar">
      <div>
        <div class="brand-stack">
          <img src="images/invenzo_logo.png" alt="INVENZO Logo" />
          <h1>INVENZO</h1>
        </div>
        <nav class="nav-links">
          <a href="dashboard.html" class="active"><i class="fas fa-chart-line"></i> Dashboard</a>
          <a href="assets.html"><i class="fas fa-boxes"></i> Assets</a>
          <a href="users.html"><i class="fas fa-users"></i> Users</a>
        </nav>
      </div>
      <button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</button>
    </aside>

    <main class="content-area">
      <header class="topbar">
        <div>
          <p class="eyebrow">Operations Overview</p>
          <h2>Dashboard</h2>
        </div>
        <div class="user-chip">
          <span id="usernameDisplay">User</span>
        </div>
      </header>

      <section class="stats-grid">
        <article class="stats-card total-card">
          <p>Total Assets</p>
          <h3 id="totalAssets">0</h3>
        </article>
        <article class="stats-card available-card">
          <p>Available</p>
          <h3 id="availableAssets">0</h3>
        </article>
        <article class="stats-card checkout-card">
          <p>Checked Out</p>
          <h3 id="checkedOutAssets">0</h3>
        </article>
      </section>

      <section class="analytics-grid">
        <article class="chart-card compact-chart-card">
          <h4>Status Distribution</h4>
          <canvas id="statusChart"></canvas>
        </article>
        <article class="chart-card">
          <h4>Top Used Assets</h4>
          <canvas id="usageChart"></canvas>
        </article>
      </section>

      <section class="role-strip">
        <div class="role-card admin-only">Admin controls enabled</div>
        <div class="role-card manager-only">Manager workflow access</div>
        <div class="role-card viewer-only">Viewer mode active</div>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jwt-decode/build/jwt-decode.min.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
