<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login | INVENZO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="icon" type="image/png" sizes="100x100" href="images/favicon.png" />
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-page">
  <div class="auth-shell">
    <aside class="auth-showcase">
      <div class="auth-brand">
        <img src="images/invenzo_logo.png" alt="INVENZO Logo" />
        <h1>INVENZO</h1>
      </div>
      <p>Control inventory movement with reliable, role-based workflows.</p>
      <ul>
        <li>Secure JWT auth</li>
        <li>Checkout and return tracking</li>
        <li>Real-time dashboard analytics</li>
      </ul>
    </aside>

    <section class="auth-panel">
      <div class="auth-card login-card">
        <h2>Welcome Back</h2>
        <p class="muted">Sign in to continue managing assets.</p>

        <form id="loginForm">
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" required placeholder="you@example.com">
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" required placeholder="Enter your password">
          </div>
          <div class="mb-3 text-end">
            <a href="forgot-password.html" class="link-inline">Forgot password?</a>
          </div>
          <button type="submit" class="btn btn-accent w-100">Login</button>
        </form>

        <p class="text-center text-muted mt-3 mb-0">New here? <a href="signup.html" class="link-inline">Create account</a></p>
      </div>
    </section>
  </div>
  <script src="js/login.js"></script>
</body>
</html>
