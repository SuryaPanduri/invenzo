<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password | INVENZO</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="login-card">
    <h3 class="text-center mb-4 fw-bold">Forgot Password</h3>
    <p class="text-muted text-center">Enter your email to generate a reset link.</p>
    <form id="forgotPasswordForm">
      <div class="mb-3">
        <label for="email" class="form-label">Email address</label>
        <input type="email" class="form-control" id="email" required placeholder="you@example.com">
      </div>
      <div class="d-grid mb-3">
        <button type="submit" class="btn btn-primary">Send Reset Link</button>
      </div>
      <p class="text-center text-muted"><a href="login.html">Back to login</a></p>
    </form>
    <div id="forgotPasswordMessage" class="small text-center"></div>
  </div>
  <script src="js/forgotPassword.js"></script>
</body>
</html>
