<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Signup | INVENZO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Manrope:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link rel="icon" type="image/png" sizes="100x100" href="images/favicon.png" />
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-page">
  <div class="auth-shell">
    <aside class="auth-showcase">
      <div class="auth-brand">
        <img src="images/invenzo_logo.png" alt="INVENZO Logo" />
        <h1>INVENZO</h1>
      </div>
      <p>Create your workspace and start tracking assets in minutes.</p>
      <ul>
        <li>Team-ready user roles</li>
        <li>Action history and analytics</li>
        <li>Built for operations teams</li>
      </ul>
    </aside>

    <section class="auth-panel">
      <div class="auth-card signup-card">
        <h2>Create Account</h2>
        <p class="muted">Set up your INVENZO access.</p>

        <form id="signupForm">
          <div class="mb-3">
            <label for="name" class="form-label">Full Name</label>
            <input type="text" class="form-control" id="name" required placeholder="John Doe">
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" required placeholder="you@example.com">
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" required placeholder="At least 8 characters">
          </div>
          <button type="submit" class="btn btn-accent w-100">Sign Up</button>
        </form>

        <p id="signupError" class="text-danger text-center mt-2 mb-0"></p>
        <p class="text-center text-muted mt-3 mb-0">Already registered? <a href="login.html" class="link-inline">Login</a></p>
      </div>
    </section>
  </div>
  <script src="js/signup.js"></script>
</body>
</html>
